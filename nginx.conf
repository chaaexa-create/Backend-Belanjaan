events { worker_connections 1024; }

http {
    types {
        text/html                             html htm shtml;
        text/css                              css;
        text/xml                              xml;
        image/gif                             gif;
        image/jpeg                            jpeg jpg;
        application/javascript                js;
        application/json                      json;
    }
    default_type application/octet-stream;

    server {
        listen MATCH_RAILWAY_PORT; # Ini teks unik untuk diganti sed nanti
        server_name localhost;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' 'https://frontend-belanjaan-vercel.app' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-XSRF-TOKEN' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' 'https://frontend-belanjaan-vercel.app' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass http://127.0.0.1:8001; # Lempar ke Laravel internal port 8001
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /app {
            proxy_pass http://127.0.0.1:8080; # Lempar ke Reverb
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
